<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Tools Suite</title>

  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f1f5f9">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b1220">

  <script>
    // Critical: Apply theme immediately to prevent FOUC
    (function() {
      try {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = saved ? (saved === 'dark') : prefersDark;
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        } else {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.colorScheme = 'light';
        }
      } catch (e) {}
    })();

    // Force the config object to exist for Tailwind
    window.tailwind = {
      config: {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              slate: {
                850: '#151e2e',
                900: '#0f172a',
                950: '#020617',
              }
            }
          }
        }
      }
    };
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">

  <style>
    /* Navigation Button Styles */
    .nav-button {
      padding: .6rem 1.25rem;
      font-size: .875rem;
      font-weight: 600;
      border-radius: 9999px;
      border: 1px solid transparent;
      transition: all .2s ease;
      color: #64748b;
      cursor: pointer;
      background: transparent;
      white-space: nowrap;
    }
    .nav-button:hover {
      background-color: #f1f5f9;
      color: #334155;
    }
    .active-nav-button {
      color: #4f46e5;
      background-color: #eef2ff;
      border-color: #c7d2fe;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }

    /* Dark Mode Overrides */
    html.dark .nav-button { color: #94a3b8; }
    html.dark .nav-button:hover { background-color: #1e293b; color: #e2e8f0; }
    html.dark .active-nav-button {
      color: #818cf8;
      background-color: #1e1b4b;
      border-color: #4338ca;
    }

    /* Main Content Area */
    main { min-height: calc(100vh - 80px); }
  </style>
</head>

<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 antialiased selection:bg-indigo-500 selection:text-white">

  <nav id="topnav" class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-md shadow-sm sticky top-0 z-30 border-b border-slate-200 dark:border-slate-800 transition-colors duration-200">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between gap-4">

      <!-- Scrollable Nav Container — populated by TOOLS config below -->
      <div class="flex-1 overflow-hidden relative group">
        <div id="nav-links" class="flex items-center gap-2 overflow-x-auto pb-1 -mb-1 scrollbar-hide">
          <!-- Buttons injected by JS from the TOOLS array -->
        </div>
      </div>

      <button id="theme-toggle"
              class="nav-button shrink-0 flex items-center gap-2 px-4 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800"
              type="button"
              aria-label="Toggle dark mode">
        <span id="theme-icon">🌙</span> <span class="hidden sm:inline">Dark</span>
      </button>
    </div>
  </nav>

  <main id="content-area" class="transition-opacity duration-200 ease-out p-1"></main>

  <footer class="text-center text-sm text-slate-500 dark:text-slate-400 py-8 bg-slate-100 dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 mt-auto">
    <p>Bio-Bench Suite • Created by <a href="https://github.com/dzyla" class="text-indigo-600 dark:text-indigo-400 hover:underline font-medium">Dawid Zyla</a></p>
  </footer>

  <script>
    /*
     * ── TOOLS REGISTRY ──────────────────────────────────────────────────────
     * Add a new tool by appending an entry here. No other HTML changes needed.
     * Fields:
     *   src   – HTML file to load (relative to index.html)
     *   label – Nav button label
     */
    const TOOLS = [
      { src: 'protein_params.html',    label: 'Protein Workbench' },
      { src: 'bio_bench.html',         label: 'Bio-Bench'         },
      { src: 'binding_calculator.html',label: 'Binding Calc'      },
      { src: 'color_generator.html',   label: 'Colors'            },
      { src: 'text_counter.html',      label: 'Text Tools'        },
      { src: 'text_detector.html',     label: 'Forensics'         },
      { src: 'gel_annotator.html',     label: 'Gel Annotator'     },
    ];

    document.addEventListener('DOMContentLoaded', () => {
      const contentArea = document.getElementById('content-area');
      const navLinksEl  = document.getElementById('nav-links');
      const themeBtn    = document.getElementById('theme-toggle');
      const themeIcon   = document.getElementById('theme-icon');
      const themeText   = themeBtn.querySelector('span.hidden');
      const docEl       = document.documentElement;

      /* Build nav buttons from config */
      TOOLS.forEach(tool => {
        const btn = document.createElement('button');
        btn.className = 'nav-button';
        btn.dataset.src = tool.src;
        btn.textContent = tool.label;
        navLinksEl.appendChild(btn);
      });

      const navButtons = navLinksEl.querySelectorAll('.nav-button[data-src]');

      /* Theme Logic */
      function updateThemeUI(isDark) {
        if (isDark) {
          themeIcon.textContent = '🌞';
          if(themeText) themeText.textContent = 'Light';
          docEl.classList.add('dark');
          docEl.style.colorScheme = 'dark';
        } else {
          themeIcon.textContent = '🌙';
          if(themeText) themeText.textContent = 'Dark';
          docEl.classList.remove('dark');
          docEl.style.colorScheme = 'light';
        }
      }

      // Init based on what was set in head script
      updateThemeUI(docEl.classList.contains('dark'));

      themeBtn.addEventListener('click', () => {
        const isDark = !docEl.classList.contains('dark');
        updateThemeUI(isDark);
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
      });

      /* Content Loading */
      async function loadContent(src) {
        contentArea.style.opacity = '0.5';

        try {
          const response = await fetch(src + '?t=' + Date.now());
          if (!response.ok) throw new Error(`Status ${response.status}`);
          const htmlText = await response.text();

          // Parse
          const parser = new DOMParser();
          const doc = parser.parseFromString(htmlText, 'text/html');

          // Clear
          contentArea.innerHTML = '';

          // Library Blacklist (prevent double loading)
          const blacklistedLibs = ['tailwindcss', 'd3', 'chart.js'];

          // Function to process a script
          const processAndAppendScript = (originalScript) => {
              const src = originalScript.getAttribute('src') || '';
              const content = originalScript.textContent || '';

              // Filter Libs
              if (src && blacklistedLibs.some(lib => src.toLowerCase().includes(lib))) {
                  console.log(`[BioShell] Skipping duplicate lib: ${src}`);
                  return;
              }

              // Filter Config
              if (!src && content.includes('tailwind.config')) {
                  console.log(`[BioShell] Skipping tailwind config`);
                  return;
              }

              const newScript = document.createElement('script');
              Array.from(originalScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
              newScript.textContent = content;
              contentArea.appendChild(newScript);
          };

          // 1. Handle Styles (from Head)
          doc.head.querySelectorAll('style').forEach(style => {
              contentArea.appendChild(document.importNode(style, true));
          });

          // 2. Handle Scripts (from Head)
          doc.head.querySelectorAll('script').forEach(processAndAppendScript);

          // 3. Handle Body Content
          Array.from(doc.body.childNodes).forEach(node => {
              if (node.tagName === 'SCRIPT') {
                  processAndAppendScript(node);
              } else {
                  contentArea.appendChild(document.importNode(node, true));
              }
          });

        } catch (err) {
          contentArea.innerHTML = `<div class="text-center p-10 text-red-500 bg-red-50 dark:bg-red-900/20 rounded-xl m-4 border border-red-200 dark:border-red-800">
            <h3 class="text-lg font-bold">Error Loading Tool</h3>
            <p>${err.message}</p>
          </div>`;
          console.error(err);
        } finally {
            contentArea.style.opacity = '1';
        }
      }

      // Nav Click Handlers
      navButtons.forEach(button => {
        button.addEventListener('click', () => {
          const src = button.getAttribute('data-src');
          navButtons.forEach(btn => btn.classList.remove('active-nav-button'));
          button.classList.add('active-nav-button');
          loadContent(src);
        });
      });

      // Default Load
      if (navButtons.length > 0) {
          // Check hash or default to first
          navButtons[0].click();
      }
    });
  </script>
</body>
</html>
